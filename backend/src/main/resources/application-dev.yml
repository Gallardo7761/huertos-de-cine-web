server:
  port: 8084
  servlet:
    context-path: /v2/cine

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/miarma_v2
    username: admin
    password: ${DB_PASS}
    driver-class-name: org.mariadb.jdbc.Driver

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

core:
  url: http://localhost:8080/v2/core

cine:
  user: SYSTEM
  password: ${CINE_PASS}